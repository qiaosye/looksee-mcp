name: Build

on:
  push:
    branches: [main, master]
    tags: ["v*"]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: pip install pyinstaller pillow

      - name: Build binary
        run: |
          pyinstaller --onefile --name "looksee-mcp-${{ matrix.os }}" src/looksee_mcp/server.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: looksee-mcp-${{ matrix.os }}
          path: dist/looksee-mcp-${{ matrix.os }}*

      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/looksee-mcp-${{ matrix.os }}*
